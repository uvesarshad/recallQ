name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: recall_test
          POSTGRES_USER: recall
          POSTGRES_PASSWORD: recall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recall"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://recall:recall@localhost:5432/recall_test
      AUTH_SECRET: ci-secret-not-used-in-tests
      AUTH_URL: http://localhost:3008
      APP_URL: http://localhost:3008
      SELF_HOSTED: "true"
      # Dummy keys — tests mock external services
      GEMINI_API_KEY: dummy
      INTERNAL_INGEST_TOKEN: dummy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: node scripts/migrate.js

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
