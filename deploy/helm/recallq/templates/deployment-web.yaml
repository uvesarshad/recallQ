apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recallq.fullname" . }}-web
  labels:
    {{- include "recallq.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "recallq.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "start"]
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "recallq.fullname" . }}-env
            - secretRef:
                name: {{ include "recallq.fullname" . }}-secret
          volumeMounts:
            - name: files
              mountPath: /data/files
      volumes:
        - name: files
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "recallq.fullname" . }}-files
          {{- else }}
          emptyDir: {}
          {{- end }}
