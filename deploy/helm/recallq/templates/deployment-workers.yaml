{{- range $name, $worker := .Values.workers }}
{{- if $worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recallq.fullname" $ }}-{{ $name }}
  labels:
    {{- include "recallq.labels" $ | nindent 4 }}
    app.kubernetes.io/component: worker-{{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: worker-{{ $name }}
  template:
    metadata:
      labels:
        {{- include "recallq.labels" $ | nindent 8 }}
        app.kubernetes.io/component: worker-{{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            {{- toYaml $worker.command | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "recallq.fullname" $ }}-env
            - secretRef:
                name: {{ include "recallq.fullname" $ }}-secret
          volumeMounts:
            - name: files
              mountPath: /data/files
      volumes:
        - name: files
          {{- if $.Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "recallq.fullname" $ }}-files
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
{{- end }}
